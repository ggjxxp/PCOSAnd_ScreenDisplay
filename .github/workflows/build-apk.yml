name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 用最老最兼容的系统环境
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # 全自动修复所有问题：仓库 + 完整 Gradle Wrapper
      - name: Fix project and init gradle
        run: |
          # 1. 修复仓库：替换 jcenter 为 mavenCentral
          sed -i 's/jcenter()/mavenCentral()/g' build.gradle
          
          # 2. 创建完整可运行的 Gradle 6.5（完美匹配你的项目）
          mkdir -p gradle/wrapper
          
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-6.5-all.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

          # 3. 下载 gradlew 脚本 + 依赖 jar
          wget -O gradlew https://raw.githubusercontent.com/gradle/gradle/v6.5.0/gradlew
          wget -O gradlew.bat https://raw.githubusercontent.com/gradle/gradle/v6.5.0/gradlew.bat
          mkdir -p gradle/wrapper
          wget -O gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v6.5.0/gradle/wrapper/gradle-wrapper.jar
          
          chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: PCOSAnd_ScreenDisplay-APK
          path: app/build/outputs/apk/release/*.apk
