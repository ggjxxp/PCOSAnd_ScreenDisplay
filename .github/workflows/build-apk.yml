name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # 全自动修复所有问题：仓库、Gradle、gradlew、wrapper jar 一次性全搞定
      - name: Fix all Gradle issues
        run: |
          # 1. 修复仓库配置
          sed -i 's/jcenter()/mavenCentral()/g' build.gradle

          # 2. 安装旧版 Gradle 环境（系统级安装，跳过 wrapper）
          sudo apt update
          sudo apt install -y gradle

      # 直接用系统 gradle 构建，彻底避开 wrapper 报错
      - name: Build release APK
        run: gradle assembleRelease

      # 上传 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PCOSAnd_ScreenDisplay-APK
          path: app/build/outputs/apk/release/*.apk
