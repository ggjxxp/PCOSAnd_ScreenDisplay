<style>
.cyberwin_app_loader{
  padding: 0;
  margin: 0;
  outline: 0;
  border: 0;
  box-sizing: border-box;
}

.cyberwin_app_loader {
  width: 100%;
  height: 100%;
  overflow: hidden;
  display:none;
}

.cyberwin_app_loader {
  background: -webkit-linear-gradient(45deg, #6fc7b5 0%, #13bdce 20%, #0094d9 40%, #5a3694 60%, #ee4d74 80%, #f58c58 100%);
  background: linear-gradient(45deg, #6fc7b5 0%, #13bdce 20%, #0094d9 40%, #5a3694 60%, #ee4d74 80%, #f58c58 100%);
  background-size: 600%;
  background-position: 0% 100%;
  -webkit-animation: gradient 7.5s ease-in-out infinite;
          animation: gradient 7.5s ease-in-out infinite;
  position: absolute;
  left: 0;
}

.loading {
  width: 100%;
  height: 100%;
}
.loading * {
  position: fixed;
  left: 50%;
  top: 50%;
  -webkit-transform: translate3d(-50%, -50%, 0) rotate(0deg);
          transform: translate3d(-50%, -50%, 0) rotate(0deg);
}

          animation: loading-block 2.5s ease-in-out 1;
}
.loading .dots.animate .dot:after {

          animation: loading-dot 2.5s ease-in-out 1;
}
.loading .dots .dot {

  height: 300px;
}

}
